<!DOCTYPE html>
<html lang="en">
<head>
    <script src="supabase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <script src="exam-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>

    <main class="asg-course-page">
        <section class="asg-page-hero">
            <div>
                <div class="asg-eyebrow">Learning paths</div>
                <h1>Courses</h1>
                <p>Open a course to see its welcome note, cheat sheet, topic list, content, quiz area, and video link.</p>
            </div>
            <div class="asg-hero-metrics">
                <div>
                    <strong id="courseCount">0</strong>
                    <span>Courses</span>
                </div>
                <div>
                    <strong id="topicCount">0</strong>
                    <span>Topics</span>
                </div>
                <div>
                    <strong>Admin</strong>
                    <span>Editable</span>
                </div>
            </div>
        </section>

        <section class="asg-course-grid" id="courseGrid"></section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Learn, practice, grow.</p>
    </footer>

    <script>
        const courseUser = getCurrentUser();

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function saveEnrollment(course) {
            const enrollmentRecord = {
                course: course.title,
                type: course.price.toLowerCase().includes("free") ? "free" : "premium",
                userId: courseUser ? courseUser.id : "",
                email: courseUser ? courseUser.email : "",
                date: new Date().toISOString()
            };
            const enrollments = JSON.parse(localStorage.getItem("enrollments") || "[]");
            enrollments.push(enrollmentRecord);
            localStorage.setItem("enrollments", JSON.stringify(enrollments));

            if (courseUser) {
                const personalEnrollments = JSON.parse(localStorage.getItem(`enrollments_${courseUser.id}`) || "[]");
                personalEnrollments.push(enrollmentRecord);
                localStorage.setItem(`enrollments_${courseUser.id}`, JSON.stringify(personalEnrollments));
            }
        }

        async function openCourse(courseId) {
            const course = asgGetCourseById(courseId);
            if (course) saveEnrollment(course);
            const progress = course ? asgGetCourseProgress(courseUser, course.id) : null;
            const savedTopic = progress && course
                ? course.topics.find((topic) => topic.id === progress.topicId)
                : null;
            const firstTopic = savedTopic || (course && course.topics.length ? course.topics[0] : null);
            sessionStorage.setItem("asgCourseFullscreen", "1");
            await ASGExamGuard.requestFullscreen();
            window.location.href = firstTopic
                ? `topic-detail.html?course=${encodeURIComponent(course.id)}&topic=${encodeURIComponent(firstTopic.id)}`
                : `course-detail.html?course=${encodeURIComponent(courseId)}`;
        }

        function renderCourses() {
            const courses = asgGetCourses();
            document.getElementById("courseCount").textContent = courses.length;
            document.getElementById("topicCount").textContent = courses.reduce((sum, course) => sum + course.topics.length, 0);

            document.getElementById("courseGrid").innerHTML = courses.map((course) => {
                const progress = asgGetCourseProgress(courseUser, course.id);
                const hasProgress = Boolean(progress && progress.topicId);
                const activeTopics = course.topics.filter((topic) => topic.status !== "draft");
                const previewTopics = activeTopics.slice(0, 4);
                const progressPercent = Math.min(Number(progress && progress.progressPercent || 0), 100);
                return `
                    <article class="asg-course-card asg-course-brochure">
                        <div class="asg-course-card-top">
                            <div>
                                <span class="asg-course-label">${escapeHtml(course.price)}</span>
                                <h2>${escapeHtml(course.title)}</h2>
                            </div>
                            <strong>${activeTopics.length}</strong>
                        </div>
                        <p>${escapeHtml(course.summary)}</p>
                        <div class="asg-course-card-meta">
                            <span>${activeTopics.length} lessons</span>
                            <span>${hasProgress ? `${progressPercent}% complete` : "New enrollment"}</span>
                            <span>PDF, HTML, video</span>
                        </div>
                        ${previewTopics.length ? `
                            <div class="asg-course-topic-chips">
                                ${previewTopics.map((topic) => `<span>${escapeHtml(topic.title)}</span>`).join("")}
                            </div>
                        ` : ""}
                        <div class="asg-course-card-footer">
                            ${hasProgress ? `
                                <div>
                                    <div class="asg-mini-progress"><span style="width: ${progressPercent}%"></span></div>
                                    <p class="asg-progress-note">Continue from ${escapeHtml(progress.topicTitle)}.</p>
                                </div>
                            ` : `
                                <div class="asg-course-start-note">Start with the first active topic and keep progress synced to your account.</div>
                            `}
                            <button class="btn-primary" type="button" onclick="openCourse('${escapeHtml(course.id)}')">${hasProgress ? "Continue Learning" : "Start Learning"}</button>
                        </div>
                    </article>
                `;
            }).join("") || `
                <div class="asg-empty-state">
                    <h2>No active courses</h2>
                    <p>Your admin can publish courses from the dashboard.</p>
                </div>
            `;
        }

        window.addEventListener("asg:data-updated", (event) => {
            if (event.detail && event.detail.key === ASG_LEARNING_KEYS.courses) renderCourses();
        });
        window.addEventListener("storage", (event) => {
            if (event.key === ASG_LEARNING_KEYS.courses) renderCourses();
        });

        renderCourses();
    </script>
</body>
</html>
