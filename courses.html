<!DOCTYPE html>
<html lang="en">
<head>
    <script src="supabase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <script src="exam-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>

    <main class="asg-course-page">
        <section class="asg-page-hero">
            <div>
                <div class="asg-eyebrow">Learning paths</div>
                <h1>Courses</h1>
                <p>Open a course to see its welcome note, cheat sheet, topic list, content, quiz area, and video link.</p>
            </div>
            <div class="asg-hero-metrics">
                <div>
                    <strong id="courseCount">0</strong>
                    <span>Courses</span>
                </div>
                <div>
                    <strong id="topicCount">0</strong>
                    <span>Topics</span>
                </div>
                <div>
                    <strong>Admin</strong>
                    <span>Editable</span>
                </div>
            </div>
        </section>

        <section class="asg-course-access-panel" id="courseAccessPanel" hidden></section>
        <section class="asg-course-grid" id="courseGrid"></section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Learn, practice, grow.</p>
    </footer>

    <script>
        const courseUser = getCurrentUser();
        let courseAccessRefreshStarted = false;

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function saveEnrollment(course) {
            const enrollmentRecord = {
                course: course.title,
                type: course.price.toLowerCase().includes("free") ? "free" : "premium",
                userId: courseUser ? courseUser.id : "",
                email: courseUser ? courseUser.email : "",
                date: new Date().toISOString()
            };
            const enrollments = JSON.parse(localStorage.getItem("enrollments") || "[]");
            enrollments.push(enrollmentRecord);
            localStorage.setItem("enrollments", JSON.stringify(enrollments));

            if (courseUser) {
                const personalEnrollments = JSON.parse(localStorage.getItem(`enrollments_${courseUser.id}`) || "[]");
                personalEnrollments.push(enrollmentRecord);
                localStorage.setItem(`enrollments_${courseUser.id}`, JSON.stringify(personalEnrollments));
            }
        }

        function redirectToCourseLogin(courseId) {
            sessionStorage.setItem("asgAuthNotice", "Sign in first, then request paid course access.");
            window.location.href = `login.html?next=${encodeURIComponent(`courses.html?course=${courseId}`)}`;
        }

        function getCourseRequestStatus(course) {
            const permission = asgGetCourseAccessPermission(courseUser, course.id);
            if (permission && permission.allowed) return "Approved";
            if (!courseUser) return "Payment required";
            const request = asgGetLatestCourseAccessRequest(courseUser, course.id);
            return request ? "Request pending" : "Payment required";
        }

        function renderCoursePaymentPanel(course) {
            const panel = document.getElementById("courseAccessPanel");
            if (!course || asgHasCourseAccess(courseUser, course)) {
                panel.hidden = true;
                panel.innerHTML = "";
                panel.dataset.courseId = "";
                return;
            }

            const request = courseUser ? asgGetLatestCourseAccessRequest(courseUser, course.id) : null;
            const canRequest = Boolean(courseUser && course.paymentQrUrl);
            const requestedDate = request && request.requestedAt
                ? new Date(request.requestedAt).toLocaleDateString()
                : "";
            const requestText = request
                ? `Request sent ${requestedDate}`
                : "After payment, send your access request to admin.";
            const action = !courseUser
                ? `<button class="btn-primary" type="button" onclick="redirectToCourseLogin('${escapeHtml(course.id)}')">Sign In to Request Access</button>`
                : `<button class="btn-primary" type="button" ${canRequest ? "" : "disabled"} onclick="requestCourseAccess('${escapeHtml(course.id)}')">${request ? "Request Again" : "I Have Paid - Request Access"}</button>`;

            panel.hidden = false;
            panel.dataset.courseId = course.id;
            panel.innerHTML = `
                <article class="asg-course-access-card">
                    <div class="asg-course-access-copy">
                        <span class="asg-course-label">${escapeHtml(course.price)}</span>
                        <h2>${escapeHtml(course.title)}</h2>
                        <p>Scan the payment QR, complete the payment, then request admin approval to unlock this paid course.</p>
                        <strong class="asg-course-payment-status">${escapeHtml(requestText)}</strong>
                        <div class="asg-form-actions">
                            ${action}
                            <a class="btn-secondary" href="courses.html">View All Courses</a>
                        </div>
                    </div>
                    <div class="asg-course-payment-box">
                        ${course.paymentQrUrl ? `
                            <img class="asg-course-payment-qr" src="${escapeHtml(course.paymentQrUrl)}" alt="${escapeHtml(course.title)} payment QR" loading="lazy" decoding="async">
                        ` : `
                            <div class="asg-empty-state compact">
                                <h2>QR not uploaded</h2>
                                <p>Admin needs to add the payment QR before students can request access.</p>
                            </div>
                        `}
                    </div>
                </article>
            `;
            panel.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        async function requestCourseAccess(courseId) {
            const course = asgGetCourseById(courseId);
            if (!course) return;
            if (!courseUser) {
                redirectToCourseLogin(course.id);
                return;
            }
            if (!course.paymentQrUrl) {
                alert("Payment QR is not available for this course yet.");
                return;
            }
            const request = asgSaveCourseAccessRequest(courseUser, course, "Student marked payment as completed.");
            renderCoursePaymentPanel(course);
            renderCourses();
            await asgSyncCourseAccessRequestToCloud(request);
            renderCoursePaymentPanel(course);
            renderCourses();
        }

        async function refreshCourseAccessStatusFromCloud() {
            if (!courseUser || courseAccessRefreshStarted) return;
            courseAccessRefreshStarted = true;
            await asgRefreshCourseAccessRequestsForUser(courseUser);
            renderCourses();
            const panel = document.getElementById("courseAccessPanel");
            const panelCourse = panel && panel.dataset.courseId ? asgGetCourseById(panel.dataset.courseId) : null;
            if (panelCourse) renderCoursePaymentPanel(panelCourse);
        }

        async function openCourse(courseId) {
            const course = asgGetCourseById(courseId);
            if (course && !asgHasCourseAccess(courseUser, course)) {
                const url = new URL(window.location.href);
                url.searchParams.set("course", course.id);
                window.history.replaceState({}, "", url);
                renderCoursePaymentPanel(course);
                return;
            }
            if (course) saveEnrollment(course);
            const progress = course ? asgGetCourseProgress(courseUser, course.id) : null;
            const savedTopic = progress && course
                ? course.topics.find((topic) => topic.id === progress.topicId)
                : null;
            const firstTopic = savedTopic || (course && course.topics.length ? course.topics[0] : null);
            sessionStorage.setItem("asgCourseFullscreen", "1");
            await ASGExamGuard.requestFullscreen();
            window.location.href = firstTopic
                ? `topic-detail.html?course=${encodeURIComponent(course.id)}&topic=${encodeURIComponent(firstTopic.id)}`
                : `course-detail.html?course=${encodeURIComponent(courseId)}`;
        }

        function renderCourses() {
            const courses = asgGetCourses();
            document.getElementById("courseCount").textContent = courses.length;
            document.getElementById("topicCount").textContent = courses.reduce((sum, course) => sum + course.topics.length, 0);

            document.getElementById("courseGrid").innerHTML = courses.map((course) => {
                const activeTopics = course.topics.filter((topic) => topic.status !== "draft");
                const previewTopics = activeTopics.slice(0, 4);
                const paid = asgIsPaidCourse(course);
                const hasAccess = asgHasCourseAccess(courseUser, course);
                const hasRequest = Boolean(courseUser && asgGetLatestCourseAccessRequest(courseUser, course.id));
                const actionText = paid && !hasAccess
                    ? (hasRequest ? "Request Pending" : "Pay & Request Access")
                    : "Start Learning";
                return `
                    <article class="asg-course-card asg-course-brochure ${paid && !hasAccess ? "is-locked" : ""}">
                        <div class="asg-course-card-top">
                            <div>
                                <span class="asg-course-label">${escapeHtml(course.price)}</span>
                                <h2>${escapeHtml(course.title)}</h2>
                            </div>
                            <strong>${activeTopics.length}</strong>
                        </div>
                        <p>${escapeHtml(course.summary)}</p>
                        <div class="asg-course-card-meta">
                            <span>${activeTopics.length} lessons</span>
                            <span>${paid ? escapeHtml(getCourseRequestStatus(course)) : "Free access"}</span>
                            <span>PDF, HTML, video</span>
                        </div>
                        ${previewTopics.length ? `
                            <div class="asg-course-topic-chips">
                                ${previewTopics.map((topic) => `<span>${escapeHtml(topic.title)}</span>`).join("")}
                            </div>
                        ` : ""}
                        <div class="asg-course-card-footer compact">
                            <button class="btn-primary" type="button" onclick="openCourse('${escapeHtml(course.id)}')">${escapeHtml(actionText)}</button>
                        </div>
                    </article>
                `;
            }).join("") || `
                <div class="asg-empty-state">
                    <h2>No active courses</h2>
                    <p>Your admin can publish courses from the dashboard.</p>
                </div>
            `;
            const panel = document.getElementById("courseAccessPanel");
            const panelCourse = panel && panel.dataset.courseId ? asgGetCourseById(panel.dataset.courseId) : null;
            if (panelCourse && asgHasCourseAccess(courseUser, panelCourse)) {
                renderCoursePaymentPanel(panelCourse);
            }
        }

        window.addEventListener("asg:data-updated", (event) => {
            if (event.detail && [
                ASG_LEARNING_KEYS.courses,
                ASG_LEARNING_KEYS.courseAccessRequests,
                ASG_LEARNING_KEYS.courseAccessPermissions
            ].includes(event.detail.key)) renderCourses();
        });
        window.addEventListener("storage", (event) => {
            if ([
                ASG_LEARNING_KEYS.courses,
                ASG_LEARNING_KEYS.courseAccessRequests,
                ASG_LEARNING_KEYS.courseAccessPermissions
            ].includes(event.key)) renderCourses();
        });

        renderCourses();
        const requestedCourse = asgGetCourseById(new URLSearchParams(window.location.search).get("course"));
        if (requestedCourse && !asgHasCourseAccess(courseUser, requestedCourse)) {
            renderCoursePaymentPanel(requestedCourse);
        }
        refreshCourseAccessStatusFromCloud();
    </script>
</body>
</html>
