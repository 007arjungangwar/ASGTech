<!DOCTYPE html>
<html lang="en">
<head>
    <script src="firebase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <script src="exam-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Exam | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="asg-assessment-focus">
    <nav></nav>

    <main class="asg-practice-page">
        <section class="asg-page-hero">
            <div>
                <div class="asg-eyebrow">Coding exam</div>
                <h1 id="examTitle">Coding Exam</h1>
                <p>Solve the questions for this subject. Runs are saved to your progress.</p>
            </div>
            <div class="asg-hero-metrics">
                <div><strong id="examQuestionCount">0</strong><span>Questions</span></div>
                <div><strong id="examSolvedCount">0</strong><span>Solved</span></div>
                <div><strong id="examRunCount">0</strong><span>Runs</span></div>
            </div>
        </section>

        <section class="asg-practice-shell">
            <aside class="asg-challenge-list" id="challengeList"></aside>

            <section class="asg-code-workspace">
                <div id="challengeDetails" class="asg-live-panel"></div>
                <div class="asg-editor-toolbar">
                    <span id="engineStatus">Python engine loads when you run code.</span>
                    <div>
                        <button class="btn-secondary" type="button" onclick="resetStarterCode()">Reset</button>
                        <button class="btn-primary" type="button" onclick="runExamCode()">Run Code</button>
                        <button class="btn-primary" type="button" onclick="submitCodingExam()">Submit Exam</button>
                    </div>
                </div>
                <textarea id="pythonEditor" class="asg-python-editor" spellcheck="false" wrap="off"></textarea>
                <div class="asg-output-panel" id="runOutput">
                    <h3>Run output</h3>
                    <p>Run your code to see printed output, return values, and test results.</p>
                </div>
            </section>
        </section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Coding exam.</p>
    </footer>

    <script>
        const examUser = getCurrentUser();
        const editor = document.getElementById("pythonEditor");
        asgEnhancePythonEditor(editor);
        const params = new URLSearchParams(window.location.search);
        const activeTopic = params.get("topic") || "Python";
        let pyodideInstance = null;
        let pyodideLoading = null;
        let challenges = [];
        let currentChallengeIndex = 0;
        let examStarted = false;
        let examSubmitted = false;
        let examSubmitting = false;
        let examGuard = null;
        let examSessionId = asgCreateId("coding_exam_session");

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function draftKey(challengeId) {
            const userId = examUser ? examUser.id : "guest";
            return `codingExamDraft_${userId}_${challengeId}`;
        }

        function getCodingExamId() {
            return asgNormalizeExamId(activeTopic, "coding-exam");
        }

        function canStartCodingExam() {
            return asgCanStartExam(examUser, "coding-exam", getCodingExamId());
        }

        function setExamControlsDisabled(disabled) {
            editor.disabled = Boolean(disabled);
            document.querySelectorAll(".asg-editor-toolbar button").forEach((button) => {
                button.disabled = Boolean(disabled);
            });
        }

        function updateStats() {
            const submissions = asgGetCodingSubmissions(examUser).filter((submission) => {
                const challenge = challenges.find((item) => item.id === submission.challengeId);
                return Boolean(challenge);
            });
            const solvedIds = new Set(submissions.filter((submission) => submission.total > 0 && submission.passed === submission.total).map((submission) => submission.challengeId));
            document.getElementById("examQuestionCount").textContent = challenges.length;
            document.getElementById("examSolvedCount").textContent = solvedIds.size;
            document.getElementById("examRunCount").textContent = submissions.length;
        }

        function renderChallengeList() {
            const submissions = asgGetCodingSubmissions(examUser);
            const solvedIds = new Set(submissions.filter((submission) => submission.total > 0 && submission.passed === submission.total).map((submission) => submission.challengeId));
            document.getElementById("challengeList").innerHTML = `
                <div class="asg-challenge-list-head">
                    <h2>${escapeHtml(activeTopic)}</h2>
                    <a href="exam-center.html">Exam Center</a>
                </div>
                ${challenges.map((challenge, index) => `
                    <button class="asg-challenge-button ${index === currentChallengeIndex ? "active" : ""}" type="button" onclick="selectChallenge(${index})">
                        <span>${escapeHtml(challenge.title)}</span>
                        <small>${escapeHtml(challenge.difficulty)} | ${solvedIds.has(challenge.id) ? "Solved" : "Open"}</small>
                    </button>
                `).join("")}
            `;
        }

        function renderChallengeDetails() {
            const challenge = challenges[currentChallengeIndex];
            if (!challenge) {
                document.getElementById("challengeDetails").innerHTML = `
                    <div class="asg-empty-state">
                        <h2>No coding questions</h2>
                        <p>Your admin can publish ${escapeHtml(activeTopic)} questions from the dashboard.</p>
                    </div>
                `;
                editor.value = "";
                asgRefreshPythonEditor(editor);
                return;
            }

            editor.value = localStorage.getItem(draftKey(challenge.id)) || challenge.starterCode || "def solution():\n    pass\n";
            asgRefreshPythonEditor(editor);
            document.getElementById("challengeDetails").innerHTML = `
                <div class="asg-question-head">
                    <span>${escapeHtml(challenge.topic)}</span>
                    <small>${escapeHtml(challenge.difficulty)}</small>
                </div>
                <h2>${escapeHtml(challenge.title)}</h2>
                <pre class="asg-question-text">${escapeHtml(challenge.prompt)}</pre>
                <div class="asg-test-preview">
                    <h3>Sample tests</h3>
                    ${challenge.tests.map((test, index) => `
                        <div class="asg-test-row">
                            <span>Test ${index + 1}</span>
                            <code>solution(${escapeHtml(test.args.map((arg) => JSON.stringify(arg)).join(", "))})</code>
                            <code>Expected: ${escapeHtml(JSON.stringify(test.expected))}</code>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function selectChallenge(index) {
            if (!examStarted || examSubmitted) return;
            currentChallengeIndex = index;
            renderChallengeList();
            renderChallengeDetails();
            renderOutputIdle();
        }

        function renderOutputIdle() {
            document.getElementById("runOutput").innerHTML = "<h3>Run output</h3><p>Run your code to see printed output, return values, and test results.</p>";
        }

        function renderExamStart() {
            document.getElementById("challengeList").innerHTML = `
                <div class="asg-challenge-list-head">
                    <h2>${escapeHtml(activeTopic)}</h2>
                    <a href="exam-center.html">Exam Center</a>
                </div>
                <div class="asg-empty-state">
                    <h2>${challenges.length} questions ready</h2>
                    <p>Start the exam to unlock the coding workspace.</p>
                </div>
            `;
            document.getElementById("challengeDetails").innerHTML = `
                <div class="asg-proctor-card">
                    <span class="asg-proctor-pill">Fullscreen coding exam</span>
                    <h2>${escapeHtml(activeTopic)} Coding Exam</h2>
                    <p>Start opens the coding exam in fullscreen. If you switch tabs, minimize the browser, or exit fullscreen, your current code will submit automatically.</p>
                    <button class="btn-primary" type="button" onclick="startCodingExam()">Start Coding Exam</button>
                </div>
            `;
            editor.value = "";
            asgRefreshPythonEditor(editor);
            renderOutputIdle();
            setExamControlsDisabled(true);
        }

        function renderExamLocked() {
            document.getElementById("challengeList").innerHTML = `
                <div class="asg-challenge-list-head">
                    <h2>${escapeHtml(activeTopic)}</h2>
                    <a href="exam-center.html">Exam Center</a>
                </div>
            `;
            document.getElementById("challengeDetails").innerHTML = `
                <div class="asg-proctor-card">
                    <span class="asg-proctor-pill">Retake locked</span>
                    <h2>${escapeHtml(activeTopic)} Coding Exam</h2>
                    <p>You have already submitted this exam. Ask your admin to allow one more attempt from the Admin Dashboard.</p>
                    <div class="asg-form-actions">
                        <a class="btn-secondary" href="tracker.html">View Progress</a>
                        <a class="btn-secondary" href="exam-center.html">Back to Exam Center</a>
                    </div>
                </div>
            `;
            editor.value = "";
            asgRefreshPythonEditor(editor);
            renderOutputIdle();
            setExamControlsDisabled(true);
        }

        async function startCodingExam() {
            if (!canStartCodingExam()) {
                renderExamLocked();
                return;
            }

            examGuard = ASGExamGuard.create({
                requireFullscreen: true,
                onViolation: (reason) => finalizeCodingExam(reason, true)
            });

            const started = await examGuard.start();
            if (!started) {
                document.getElementById("challengeDetails").innerHTML = `
                    <div class="asg-proctor-card">
                        <span class="asg-proctor-pill danger">Fullscreen required</span>
                        <h2>Fullscreen permission was not granted</h2>
                        <p>Please click Start again and allow fullscreen to begin this coding exam.</p>
                        <button class="btn-primary" type="button" onclick="startCodingExam()">Start Coding Exam</button>
                    </div>
                `;
                return;
            }

            examStarted = true;
            examSubmitted = false;
            examSessionId = asgCreateId("coding_exam_session");
            setExamControlsDisabled(false);
            renderChallengeList();
            renderChallengeDetails();
            renderOutputIdle();
        }

        function resetStarterCode() {
            const challenge = challenges[currentChallengeIndex];
            if (!challenge || !confirm("Reset this editor to the starter code?")) return;
            editor.value = challenge.starterCode || "def solution():\n    pass\n";
            asgRefreshPythonEditor(editor);
            localStorage.setItem(draftKey(challenge.id), editor.value);
            renderOutputIdle();
        }

        function insertTextAtCursor(text) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = `${editor.value.slice(0, start)}${text}${editor.value.slice(end)}`;
            editor.selectionStart = editor.selectionEnd = start + text.length;
            asgRefreshPythonEditor(editor);
        }

        function handleTabKey(event) {
            event.preventDefault();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selectedText = editor.value.slice(start, end);

            if (!selectedText.includes("\n")) {
                if (event.shiftKey) {
                    const before = editor.value.slice(0, start);
                    const lineStart = before.lastIndexOf("\n") + 1;
                    const linePrefix = editor.value.slice(lineStart, lineStart + 4);
                    if (linePrefix === "    ") {
                        editor.value = editor.value.slice(0, lineStart) + editor.value.slice(lineStart + 4);
                        editor.selectionStart = editor.selectionEnd = Math.max(lineStart, start - 4);
                        asgRefreshPythonEditor(editor);
                    }
                    return;
                }

                insertTextAtCursor("    ");
                return;
            }

            const lines = selectedText.split("\n");
            const updated = event.shiftKey
                ? lines.map((line) => line.startsWith("    ") ? line.slice(4) : line).join("\n")
                : lines.map((line) => `    ${line}`).join("\n");

            editor.value = `${editor.value.slice(0, start)}${updated}${editor.value.slice(end)}`;
            editor.selectionStart = start;
            editor.selectionEnd = start + updated.length;
            asgRefreshPythonEditor(editor);
        }

        function handleEnterKey(event) {
            event.preventDefault();
            const start = editor.selectionStart;
            const beforeCursor = editor.value.slice(0, start);
            const currentLine = beforeCursor.slice(beforeCursor.lastIndexOf("\n") + 1);
            const indentation = currentLine.match(/^\s*/)[0];
            const extraIndent = currentLine.trim().endsWith(":") ? "    " : "";
            insertTextAtCursor(`\n${indentation}${extraIndent}`);
        }

        editor.addEventListener("keydown", (event) => {
            if (event.key === "Tab") handleTabKey(event);
            if (event.key === "Enter") handleEnterKey(event);
        });

        editor.addEventListener("input", () => {
            const challenge = challenges[currentChallengeIndex];
            if (challenge) localStorage.setItem(draftKey(challenge.id), editor.value);
        });

        function loadPyodideScript() {
            if (window.loadPyodide) return Promise.resolve();
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js";
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function getPyodideEngine() {
            if (pyodideInstance) return pyodideInstance;
            if (!pyodideLoading) {
                document.getElementById("engineStatus").textContent = "Loading Python engine...";
                pyodideLoading = loadPyodideScript()
                    .then(() => window.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" }))
                    .then((engine) => {
                        pyodideInstance = engine;
                        document.getElementById("engineStatus").textContent = "Python engine ready.";
                        return engine;
                    });
            }
            return pyodideLoading;
        }

        function buildHarness(code, tests) {
            return `
import contextlib, io, json, traceback
USER_CODE = ${JSON.stringify(code)}
TESTS = json.loads(${JSON.stringify(JSON.stringify(tests))})
payload = {"passed": 0, "total": len(TESTS), "results": [], "stdout": "", "setupStdout": "", "error": ""}
setup_buffer = io.StringIO()
namespace = {}
try:
    with contextlib.redirect_stdout(setup_buffer):
        exec(USER_CODE, namespace)
    payload["setupStdout"] = setup_buffer.getvalue()
    solution = namespace.get("solution")
    if not callable(solution):
        raise Exception("Define a function named solution.")
    for index, test in enumerate(TESTS, start=1):
        try:
            test_buffer = io.StringIO()
            args = test.get("args", [])
            with contextlib.redirect_stdout(test_buffer):
                got = solution(*args)
            expected = test.get("expected")
            passed = got == expected
            if passed:
                payload["passed"] += 1
            payload["results"].append({"index": index, "passed": passed, "args": args, "expected": expected, "got": got, "stdout": test_buffer.getvalue()})
        except Exception as error:
            payload["results"].append({"index": index, "passed": False, "args": test.get("args", []), "expected": test.get("expected"), "got": "Error: " + str(error), "stdout": locals().get("test_buffer", io.StringIO()).getvalue()})
except Exception:
    payload["error"] = traceback.format_exc(limit=4)
    payload["setupStdout"] = setup_buffer.getvalue()
payload["stdout"] = payload["setupStdout"] + "".join([item.get("stdout", "") for item in payload["results"]])
json.dumps(payload, default=str)
`;
        }

        function renderRunResult(payload) {
            const percentage = payload.total ? Math.round((payload.passed / payload.total) * 100) : 0;
            const stdoutBlock = payload.stdout || payload.setupStdout
                ? `<pre>${escapeHtml(payload.stdout || payload.setupStdout)}</pre>`
                : "<p>No printed output.</p>";
            document.getElementById("runOutput").innerHTML = `
                <div class="asg-result-summary">
                    <div><span>Tests passed</span><strong>${payload.passed}/${payload.total}</strong></div>
                    <div><span>Score</span><strong>${percentage}%</strong></div>
                    <p>Run saved to your progress.</p>
                </div>
                ${payload.error ? `<pre class="asg-error-output">${escapeHtml(payload.error)}</pre>` : ""}
                <div class="asg-run-output-grid">
                    <section class="asg-console-output">
                        <h3>Console output</h3>
                        ${stdoutBlock}
                    </section>
                    <section class="asg-return-output">
                        <h3>Function return values</h3>
                        <div class="asg-review-list">
                            ${payload.results.map((result) => `
                                <article class="asg-review-item ${result.passed ? "correct" : "wrong"}">
                                    <div class="asg-question-head"><span>Test ${result.index}</span><small>${result.passed ? "Passed" : "Failed"}</small></div>
                                    <p><strong>Input:</strong> solution(${escapeHtml((result.args || []).map((arg) => JSON.stringify(arg)).join(", "))})</p>
                                    <p><strong>Returned:</strong> ${escapeHtml(JSON.stringify(result.got))}</p>
                                    <p><strong>Expected:</strong> ${escapeHtml(JSON.stringify(result.expected))}</p>
                                    ${result.stdout ? `<h4>Printed during this test</h4><pre>${escapeHtml(result.stdout)}</pre>` : ""}
                                </article>
                            `).join("")}
                        </div>
                    </section>
                </div>
            `;
        }

        function saveCodingExamSubmission(challenge, payload, reason = "manual-run") {
            const percentage = payload.total ? Math.round((payload.passed / payload.total) * 100) : 0;
            return asgSaveCodingSubmission({
                challengeId: challenge.id,
                challengeTitle: `${activeTopic} Exam: ${challenge.title}`,
                passed: payload.passed,
                total: payload.total,
                percentage,
                code: editor.value,
                results: payload.results,
                stdout: payload.stdout,
                examType: "coding-exam",
                examId: getCodingExamId(),
                sessionId: examSessionId,
                submissionReason: reason
            });
        }

        function buildFallbackPayload(challenge, error) {
            return {
                passed: 0,
                total: challenge.tests.length,
                stdout: "",
                error: String(error && (error.message || error) || "Code could not be evaluated before submission."),
                results: challenge.tests.map((test, index) => ({
                    index: index + 1,
                    passed: false,
                    expected: test.expected,
                    got: "Not evaluated"
                }))
            };
        }

        async function runExamCode(options = {}) {
            const challenge = challenges[currentChallengeIndex];
            if (!challenge || !examStarted || examSubmitted) return null;
            const runButton = document.querySelector(".asg-editor-toolbar .btn-primary");
            runButton.disabled = true;
            runButton.textContent = "Running...";
            document.getElementById("runOutput").innerHTML = `
                <h3>Run output</h3>
                <p>Running your code. Console output and return values will appear here.</p>
            `;

            try {
                const engine = await getPyodideEngine();
                const payload = JSON.parse(await engine.runPythonAsync(buildHarness(editor.value, challenge.tests)));
                const savedSubmission = saveCodingExamSubmission(challenge, payload, options.reason || "manual-run");
                renderRunResult(payload);
                updateStats();
                renderChallengeList();
                return savedSubmission;
            } catch (error) {
                document.getElementById("engineStatus").textContent = "Python engine failed to load.";
                if (options.finalRun) {
                    const payload = buildFallbackPayload(challenge, error);
                    const savedSubmission = saveCodingExamSubmission(challenge, payload, options.reason || "auto-submit");
                    renderRunResult(payload);
                    return savedSubmission;
                }
                document.getElementById("runOutput").innerHTML = `<h3>Run output</h3><pre class="asg-error-output">${escapeHtml(error.message || error)}</pre>`;
                return null;
            } finally {
                runButton.disabled = false;
                runButton.textContent = "Run Code";
            }
        }

        function getSessionSubmissions() {
            return asgGetCodingSubmissions(examUser).filter((submission) => (
                submission.examType === "coding-exam" &&
                submission.examId === getCodingExamId() &&
                submission.sessionId === examSessionId
            ));
        }

        function getCodingExamScore() {
            const submissions = getSessionSubmissions();
            return challenges.reduce((summary, challenge) => {
                const best = submissions
                    .filter((submission) => submission.challengeId === challenge.id)
                    .sort((left, right) => Number(right.percentage || 0) - Number(left.percentage || 0))[0];
                summary.score += best ? Number(best.passed || 0) : 0;
                summary.total += challenge.tests.length;
                return summary;
            }, { score: 0, total: 0 });
        }

        function renderCodingExamResult(attempt) {
            document.getElementById("challengeDetails").innerHTML = `
                <div class="asg-proctor-card">
                    <span class="asg-proctor-pill">${attempt.status === "auto-submitted" ? "Auto-submitted" : "Submitted"}</span>
                    <h2>${escapeHtml(attempt.examTitle)}</h2>
                    <div class="asg-result-summary">
                        <div><span>Score</span><strong>${attempt.score}/${attempt.total}</strong></div>
                        <div><span>Percentage</span><strong>${Math.round(attempt.percentage)}%</strong></div>
                        <p>${attempt.status === "auto-submitted" ? `Submitted because exam focus was lost (${escapeHtml(attempt.reason)}).` : "Exam submitted and saved to progress."}</p>
                    </div>
                    <div class="asg-form-actions">
                        <a class="btn-secondary" href="tracker.html">View Progress</a>
                        <a class="btn-secondary" href="exam-center.html">Back to Exam Center</a>
                    </div>
                </div>
            `;
            setExamControlsDisabled(true);
        }

        async function finalizeCodingExam(reason = "manual-submit", auto = false) {
            if (examSubmitting || examSubmitted || !examStarted) return;
            examSubmitting = true;
            if (examGuard) examGuard.stop();

            await runExamCode({ finalRun: true, reason });
            const summary = getCodingExamScore();
            const percentage = summary.total ? Math.round((summary.score / summary.total) * 100) : 0;
            const attempt = asgSaveExamAttempt({
                examType: "coding-exam",
                examId: getCodingExamId(),
                examTitle: `${activeTopic} Coding Exam`,
                score: summary.score,
                total: summary.total,
                percentage,
                status: auto ? "auto-submitted" : "submitted",
                reason,
                sessionId: examSessionId,
                details: { submissions: getSessionSubmissions() }
            });

            examSubmitted = true;
            examStarted = false;
            examSubmitting = false;
            if (!auto) ASGExamGuard.exitFullscreen();
            renderCodingExamResult(attempt);
            updateStats();
            renderChallengeList();
        }

        function submitCodingExam() {
            finalizeCodingExam("manual-submit", false);
        }

        function loadExam() {
            document.getElementById("examTitle").textContent = `${activeTopic} Coding Exam`;
            challenges = asgGetCodingChallenges(false, { globalOnly: true }).filter((challenge) => challenge.topic.toLowerCase() === activeTopic.toLowerCase());
            updateStats();
            if (!challenges.length) {
                renderChallengeList();
                renderChallengeDetails();
                setExamControlsDisabled(true);
                return;
            }
            if (!canStartCodingExam()) {
                renderExamLocked();
                return;
            }
            renderExamStart();
        }

        loadExam();
    </script>
</body>
</html>
