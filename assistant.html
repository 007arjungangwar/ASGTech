<!DOCTYPE html>
<html lang="en">
<head>
    <script src="firebase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="asg-ai-page">
    <nav></nav>

    <main class="asg-ai-shell">
        <section class="asg-page-hero asg-ai-hero">
            <div>
                <div class="asg-eyebrow">AI Tutor</div>
                <h1>Your AI Study Assistant</h1>
                <p>Ask about Python, machine learning, projects, exams, roadmaps, and study planning.</p>
            </div>
            <div class="asg-hero-metrics">
                <div><strong id="aiSessionCount">0</strong><span>Messages</span></div>
                <div><strong id="aiTopicCount">8</strong><span>Topics</span></div>
                <div><strong>Live</strong><span>Assistant</span></div>
            </div>
        </section>

        <section class="asg-ai-layout">
            <aside class="asg-live-panel asg-ai-side">
                <div class="asg-question-head">
                    <span>Quick prompts</span>
                    <small>Study help</small>
                </div>
                <div class="asg-ai-prompts" id="quickPrompts"></div>
                <button class="btn-secondary" type="button" onclick="clearAssistantChat()">Clear Chat</button>
            </aside>

            <section class="asg-live-panel asg-ai-chat-card">
                <div class="asg-ai-chat-head">
                    <div>
                        <h2>Study Chat</h2>
                        <p id="assistantStatus">Ready to help with your next learning step.</p>
                    </div>
                    <span class="asg-ai-status-dot">Online</span>
                </div>

                <div class="asg-ai-messages" id="chatMessages" aria-live="polite"></div>

                <form class="asg-ai-input-row" onsubmit="event.preventDefault(); sendMessage();">
                    <textarea id="chatInput" rows="2" placeholder="Ask a study question..." onkeydown="handleAssistantInput(event)"></textarea>
                    <button class="btn-primary" type="submit">Send</button>
                </form>
            </section>
        </section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Learn with focused guidance.</p>
    </footer>

    <script>
        const assistantStorageKey = "asgAssistantChatHistory";
        const assistantPrompts = [
            "How should I start Python?",
            "Explain machine learning simply",
            "Give me a 7 day study plan",
            "Suggest a beginner project",
            "How do I prepare for coding tests?",
            "What should I learn after Pandas?",
            "How can I improve my resume?",
            "Explain PINNs in simple words"
        ];

        const assistantKnowledge = [
            {
                match: ["python", "start", "beginner", "basics"],
                title: "Python start plan",
                body: "Start with variables, input/output, conditions, loops, lists, dictionaries, and functions. Then solve 3 small problems daily: one loop problem, one list problem, and one function problem. After that, open Coding Practice and run your code against tests."
            },
            {
                match: ["machine learning", "ml", "model", "train"],
                title: "Machine learning path",
                body: "Machine learning means learning patterns from data. Learn the workflow in this order: clean data, split train/test, choose a model, train it, evaluate it, and improve features. Start with regression and classification before deep learning."
            },
            {
                match: ["pandas", "dataframe", "data analysis", "csv"],
                title: "Pandas practice",
                body: "Practice read_csv, head, info, describe, selecting columns, filtering rows, groupby, missing values, and simple plots. A good project is a student marks dashboard or sales summary notebook."
            },
            {
                match: ["project", "portfolio", "github"],
                title: "Project guidance",
                body: "Build projects that show a complete workflow. Use a clear README, screenshots, dataset notes, method, result, and next improvements. Good starters: student performance dashboard, house price regression, movie recommender, and resume keyword analyzer."
            },
            {
                match: ["coding test", "exam", "practice", "hacker", "leetcode"],
                title: "Coding test practice",
                body: "For coding tests, focus on clean function writing. Read the input, handle edge cases, return the exact expected value, and use print only for debugging. Practice arrays, strings, dictionaries, sorting, and simple recursion."
            },
            {
                match: ["iit", "college", "jee", "admission"],
                title: "College and skill advice",
                body: "A strong college can help, but skills and proof matter a lot. Keep your fundamentals strong, build projects, publish your work, and practice communication. Consistent work beats random long study sessions."
            },
            {
                match: ["resume", "job", "career", "placement", "internship"],
                title: "Career plan",
                body: "Your resume should show skills through evidence: projects, GitHub links, problem-solving, tools, and measurable outcomes. Add one strong project, one dashboard, one model, and one deployed or documented tool."
            },
            {
                match: ["pinn", "physics", "deep learning", "neural"],
                title: "PINNs and deep learning",
                body: "A Physics-Informed Neural Network combines data loss with physics-equation loss. Learn neural networks, gradients, loss functions, and differential equations basics before building a PINN project."
            }
        ];

        function escapeAssistantText(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function readAssistantHistory() {
            try {
                const history = JSON.parse(localStorage.getItem(assistantStorageKey) || "[]");
                return Array.isArray(history) ? history : [];
            } catch (error) {
                return [];
            }
        }

        function saveAssistantHistory(history) {
            localStorage.setItem(assistantStorageKey, JSON.stringify(history.slice(-30)));
        }

        function updateAssistantStats() {
            document.getElementById("aiSessionCount").textContent = readAssistantHistory().length;
        }

        function renderQuickPrompts() {
            document.getElementById("quickPrompts").innerHTML = assistantPrompts.map((prompt) => `
                <button type="button" onclick="askQuick('${escapeAssistantText(prompt)}')">${escapeAssistantText(prompt)}</button>
            `).join("");
        }

        function addMessage(text, role, persist = true) {
            const messagesDiv = document.getElementById("chatMessages");
            const message = document.createElement("article");
            message.className = `asg-ai-message ${role === "user" ? "user" : "assistant"}`;
            message.innerHTML = `
                <span>${role === "user" ? "You" : "ASG Tutor"}</span>
                <p>${escapeAssistantText(text)}</p>
            `;
            messagesDiv.appendChild(message);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (persist) {
                const history = readAssistantHistory();
                history.push({ role, text, at: new Date().toISOString() });
                saveAssistantHistory(history);
                updateAssistantStats();
            }
        }

        function renderAssistantHistory() {
            const messagesDiv = document.getElementById("chatMessages");
            messagesDiv.innerHTML = "";
            const history = readAssistantHistory();
            if (!history.length) {
                addMessage("Hi, I am your ASG study tutor. Tell me what you are learning and I will suggest a clear next step.", "assistant", false);
                updateAssistantStats();
                return;
            }
            history.forEach((item) => addMessage(item.text, item.role, false));
            updateAssistantStats();
        }

        function getBotResponse(question) {
            const q = String(question || "").toLowerCase();
            const matched = assistantKnowledge.find((entry) => entry.match.some((word) => q.includes(word)));

            if (matched) {
                return `${matched.title}: ${matched.body}`;
            }

            if (q.includes("roadmap") || q.includes("plan") || q.includes("schedule")) {
                return "Study plan: choose one course topic, read the lesson, finish the quiz, solve the coding task, and write 3 revision notes. Repeat this cycle daily for steady progress.";
            }

            if (q.includes("certificate")) {
                return "Certificate progress depends on real course activity. Complete lessons, topic quizzes, and coding tasks first, then request certificate access from the certificate page.";
            }

            return "Here is a practical next step: write down the topic, the exact confusion, and one example. Then open the matching course lesson or coding practice. If you ask with the topic name, I can give a more direct explanation.";
        }

        function sendMessage() {
            const input = document.getElementById("chatInput");
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, "user");
            input.value = "";
            document.getElementById("assistantStatus").textContent = "Thinking through your study question...";

            window.setTimeout(() => {
                const response = getBotResponse(question);
                addMessage(response, "assistant");
                document.getElementById("assistantStatus").textContent = "Ready to help with your next learning step.";
            }, 240);
        }

        function handleAssistantInput(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function askQuick(question) {
            document.getElementById("chatInput").value = question;
            sendMessage();
        }

        function clearAssistantChat() {
            if (!confirm("Clear this AI Tutor chat?")) return;
            localStorage.removeItem(assistantStorageKey);
            renderAssistantHistory();
        }

        renderQuickPrompts();
        renderAssistantHistory();
    </script>
</body>
</html>
