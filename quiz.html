<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth-check.js"></script>
    <script src="learning-data.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Assessment Quiz | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>

    <main class="asg-quiz-page">
        <section class="asg-page-hero">
            <div>
                <div class="asg-eyebrow">Skill assessment</div>
                <h1>Skill Assessment Quiz</h1>
                <p>Answer each question, submit once, and your score will be saved to your student progress.</p>
            </div>
            <div class="asg-hero-metrics">
                <div>
                    <strong id="quizQuestionCount">0</strong>
                    <span>Questions</span>
                </div>
                <div>
                    <strong id="quizBestScore">0%</strong>
                    <span>Best score</span>
                </div>
                <div>
                    <strong id="quizAttemptCount">0</strong>
                    <span>Attempts</span>
                </div>
            </div>
        </section>

        <section class="asg-quiz-picker" id="quizSelector" aria-label="Available quizzes"></section>
        <section class="asg-live-panel" id="quizMount"></section>
        <section class="asg-live-panel" id="quizResult" hidden></section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Test your skills and keep improving.</p>
    </footer>

    <script>
        const quizUser = getCurrentUser();
        const quizCatalog = asgGetQuizCatalog();
        let quizQuestions = [];
        let activeQuizId = getInitialQuizId();
        let quizSubmitted = false;

        function getInitialQuizId() {
            const params = new URLSearchParams(window.location.search);
            const requestedQuiz = params.get("quiz") || localStorage.getItem("asgSelectedQuizId") || "python";
            return asgGetQuizById(requestedQuiz).id;
        }

        function getActiveQuiz() {
            return asgGetQuizById(activeQuizId);
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function updateQuizStats() {
            const attempts = asgGetQuizAttempts(quizUser, activeQuizId);
            const best = attempts.length
                ? Math.round(Math.max(...attempts.map((attempt) => Number(attempt.percentage || 0))))
                : 0;

            document.getElementById("quizQuestionCount").textContent = quizQuestions.length;
            document.getElementById("quizBestScore").textContent = `${best}%`;
            document.getElementById("quizAttemptCount").textContent = attempts.length;
        }

        function renderQuizSelector() {
            const allQuestions = asgGetQuizQuestions(false);
            const selector = document.getElementById("quizSelector");

            selector.innerHTML = quizCatalog.map((quiz) => {
                const questionCount = allQuestions.filter((question) => question.quizId === quiz.id).length;
                const attempts = asgGetQuizAttempts(quizUser, quiz.id);
                const best = attempts.length
                    ? Math.round(Math.max(...attempts.map((attempt) => Number(attempt.percentage || 0))))
                    : 0;

                return `
                    <button
                        class="asg-quiz-card ${quiz.id === activeQuizId ? "active" : ""}"
                        type="button"
                        onclick="selectQuiz('${quiz.id}')"
                    >
                        <span>${escapeHtml(quiz.title)}</span>
                        <strong>${questionCount} questions</strong>
                        <small>${attempts.length} attempts | Best ${best}%</small>
                    </button>
                `;
            }).join("");
        }

        function selectQuiz(quizId) {
            activeQuizId = asgGetQuizById(quizId).id;
            quizSubmitted = false;
            localStorage.setItem("asgSelectedQuizId", activeQuizId);

            const url = new URL(window.location.href);
            url.searchParams.set("quiz", activeQuizId);
            window.history.replaceState({}, "", url);

            renderQuiz();
        }

        function renderQuiz() {
            const activeQuiz = getActiveQuiz();
            quizQuestions = asgGetQuizQuestions(false, activeQuiz.id);
            const mount = document.getElementById("quizMount");
            const result = document.getElementById("quizResult");

            renderQuizSelector();
            updateQuizStats();
            result.hidden = true;
            mount.hidden = false;

            if (!quizQuestions.length) {
                mount.innerHTML = `
                    <div class="asg-empty-state">
                        <h2>No active questions in ${escapeHtml(activeQuiz.title)}</h2>
                        <p>Your admin can publish questions from the dashboard.</p>
                    </div>
                `;
                return;
            }

            mount.innerHTML = `
                <div class="asg-section-header">
                    <div>
                        <h2>${escapeHtml(activeQuiz.title)}</h2>
                        <p>${escapeHtml(activeQuiz.description)}</p>
                    </div>
                    <button class="btn-secondary" type="button" onclick="clearQuizSelection()">Clear answers</button>
                </div>

                <form id="skillQuizForm" class="asg-quiz-form">
                    ${quizQuestions.map((question, index) => `
                        <article class="asg-question-block" data-question-id="${escapeHtml(question.id)}">
                            <div class="asg-question-head">
                                <span>Question ${index + 1}</span>
                                <small>${escapeHtml(question.topic)} | ${escapeHtml(question.difficulty)}</small>
                            </div>
                            <pre class="asg-question-text">${escapeHtml(question.prompt)}</pre>
                            <div class="asg-option-grid">
                                ${question.options.map((option) => `
                                    <label class="asg-option-choice">
                                        <input type="radio" name="question_${escapeHtml(question.id)}" value="${escapeHtml(option.id)}">
                                        <span>${escapeHtml(option.text)}</span>
                                    </label>
                                `).join("")}
                            </div>
                        </article>
                    `).join("")}

                    <div class="asg-form-actions">
                        <button class="btn-primary" type="button" onclick="submitSkillQuiz()">Submit Quiz</button>
                        <a class="btn-secondary" href="coding-practice.html">Open Coding Practice</a>
                    </div>
                </form>
            `;
        }

        function clearQuizSelection() {
            document.querySelectorAll("#skillQuizForm input[type='radio']").forEach((input) => {
                input.checked = false;
            });
        }

        function submitSkillQuiz() {
            if (!quizQuestions.length) return;

            const answers = quizQuestions.map((question) => {
                const selected = Array.from(document.querySelectorAll("#skillQuizForm input[type='radio']"))
                    .find((input) => input.name === `question_${question.id}` && input.checked);
                const selectedOption = selected
                    ? question.options.find((option) => option.id === selected.value)
                    : null;
                const correctOption = question.options.find((option) => option.id === question.correctOption);
                const isCorrect = Boolean(selected && selected.value === question.correctOption);

                return {
                    questionId: question.id,
                    prompt: question.prompt,
                    selectedOption: selected ? selected.value : "",
                    selectedText: selectedOption ? selectedOption.text : "Not answered",
                    correctOption: question.correctOption,
                    correctText: correctOption ? correctOption.text : "",
                    explanation: question.explanation,
                    isCorrect
                };
            });

            const unanswered = answers.filter((answer) => !answer.selectedOption).length;
            if (unanswered > 0) {
                const confirmed = confirm(`${unanswered} question(s) are unanswered. Submit anyway?`);
                if (!confirmed) return;
            }

            const score = answers.filter((answer) => answer.isCorrect).length;
            const total = quizQuestions.length;
            const percentage = Math.round((score / total) * 100);
            const activeQuiz = getActiveQuiz();
            const savedAttempt = asgSaveQuizAttempt({
                quizId: activeQuiz.id,
                quizTitle: activeQuiz.title,
                score,
                total,
                percentage,
                answers
            });

            quizSubmitted = true;
            renderResult(savedAttempt);
            updateQuizStats();
            renderQuizSelector();
        }

        function renderResult(attempt) {
            const mount = document.getElementById("quizMount");
            const result = document.getElementById("quizResult");
            const message = attempt.percentage >= 80
                ? "Strong work. You are ready for the next level."
                : attempt.percentage >= 60
                    ? "Good base. Review the missed questions and try again."
                    : "Keep practicing. Start with the explanations below and rebuild momentum.";

            mount.hidden = true;
            result.hidden = false;
            result.innerHTML = `
                <div class="asg-result-summary">
                    <div>
                        <span>Your score</span>
                        <strong>${attempt.score}/${attempt.total}</strong>
                    </div>
                    <div>
                        <span>Percentage</span>
                        <strong>${Math.round(attempt.percentage)}%</strong>
                    </div>
                    <p>${escapeHtml(message)}</p>
                </div>

                <div class="asg-review-list">
                    ${attempt.answers.map((answer, index) => `
                        <article class="asg-review-item ${answer.isCorrect ? "correct" : "wrong"}">
                            <div class="asg-question-head">
                                <span>Question ${index + 1}</span>
                                <small>${answer.isCorrect ? "Correct" : "Needs review"}</small>
                            </div>
                            <pre class="asg-question-text">${escapeHtml(answer.prompt)}</pre>
                            <p><strong>Your answer:</strong> ${escapeHtml(answer.selectedText)}</p>
                            <p><strong>Correct answer:</strong> ${escapeHtml(answer.correctText)}</p>
                            ${answer.explanation ? `<p>${escapeHtml(answer.explanation)}</p>` : ""}
                        </article>
                    `).join("")}
                </div>

                <div class="asg-form-actions">
                    <button class="btn-primary" type="button" onclick="retakeQuiz()">Retake Quiz</button>
                    <a class="btn-secondary" href="tracker.html">View Progress</a>
                </div>
            `;
        }

        function retakeQuiz() {
            quizSubmitted = false;
            renderQuiz();
        }

        function handleQuizDataUpdate(event) {
            const key = event.detail ? event.detail.key : event.key;
            if (key !== ASG_LEARNING_KEYS.quizQuestions) return;
            if (quizSubmitted) return;
            renderQuiz();
        }

        window.addEventListener("asg:data-updated", handleQuizDataUpdate);
        window.addEventListener("storage", handleQuizDataUpdate);

        renderQuiz();
    </script>
</body>
</html>
