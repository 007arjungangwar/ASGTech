<!DOCTYPE html>
<html lang="en">
<head>
    <script src="firebase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>

    <main class="asg-public-blog-page">
        <section class="asg-page-hero asg-editorial-hero">
            <div>
                <div class="asg-eyebrow">Learning journal</div>
                <h1>ASG Tech Blog</h1>
                <p>Professional notes, tutorials, project thinking, and practical study guidance for coding and data science learners.</p>
            </div>
            <div class="asg-hero-metrics">
                <div><strong id="blogPostCount">0</strong><span>Posts</span></div>
                <div><strong id="blogCategoryCount">0</strong><span>Topics</span></div>
                <div><strong>Admin</strong><span>Editable</span></div>
            </div>
        </section>

        <section class="asg-public-toolbar">
            <input id="blogSearch" type="search" placeholder="Search blog posts..." oninput="renderBlogPosts()">
            <div class="asg-resource-filters" id="blogFilters"></div>
        </section>

        <section class="asg-featured-story" id="featuredBlogPost"></section>
        <section class="asg-blog-reader" id="blogReader" hidden></section>
        <section class="asg-public-card-grid" id="blogGrid"></section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Clear learning notes for serious students.</p>
    </footer>

    <script>
        let activeBlogCategory = "All";

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function setBlogCategory(category) {
            activeBlogCategory = category;
            renderBlogPosts();
        }

        function blogPostHref(post) {
            return post.url || `blog.html#${encodeURIComponent(post.id)}`;
        }

        function renderBlogBody(value) {
            const lines = String(value || "")
                .split(/\n+/)
                .map((line) => line.trim())
                .filter(Boolean);
            return (lines.length ? lines : ["This article is being prepared by the ASG Tech team."])
                .map((line) => `<p>${escapeHtml(line)}</p>`)
                .join("");
        }

        function renderBlogAction(post, featured = false) {
            const className = featured ? "btn-primary" : "asg-card-link secondary";
            if (post.url) {
                return `<a class="${className}" href="${escapeHtml(post.url)}" ${/^https?:\/\//i.test(post.url) ? "target=\"_blank\" rel=\"noopener\"" : ""}>Read Article</a>`;
            }
            return `<button class="${className}" type="button" onclick="openBlogPost('${escapeHtml(post.id)}')">Read Article</button>`;
        }

        function openBlogPost(postId) {
            const post = asgGetBlogPosts().find((item) => item.id === postId);
            if (!post) return;
            const reader = document.getElementById("blogReader");
            reader.hidden = false;
            reader.innerHTML = `
                <article>
                    <div class="asg-question-head">
                        <span>${escapeHtml(post.category)}</span>
                        <small>${escapeHtml(post.readTime)} | ${escapeHtml(post.author)}</small>
                    </div>
                    <h2>${escapeHtml(post.title)}</h2>
                    <div class="asg-blog-reader-body">${renderBlogBody(post.body || post.excerpt)}</div>
                    <button class="asg-link-button" type="button" onclick="document.getElementById('blogReader').hidden = true">Close Article</button>
                </article>
            `;
            reader.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function renderBlogPosts() {
            const posts = asgGetBlogPosts();
            const query = document.getElementById("blogSearch").value.trim().toLowerCase();
            const categories = ["All", ...new Set(posts.map((post) => post.category))];
            const visible = posts.filter((post) => {
                const categoryMatch = activeBlogCategory === "All" || post.category === activeBlogCategory;
                const text = `${post.title} ${post.category} ${post.excerpt} ${post.body}`.toLowerCase();
                return categoryMatch && (!query || text.includes(query));
            });
            const featured = visible.find((post) => post.featured) || visible[0] || null;
            const gridPosts = featured ? visible.filter((post) => post.id !== featured.id) : visible;

            document.getElementById("blogPostCount").textContent = posts.length;
            document.getElementById("blogCategoryCount").textContent = Math.max(categories.length - 1, 0);
            document.getElementById("blogFilters").innerHTML = categories.map((category) => `
                <button class="${category === activeBlogCategory ? "active" : ""}" type="button" onclick="setBlogCategory(${escapeHtml(JSON.stringify(category))})">${escapeHtml(category)}</button>
            `).join("");

            document.getElementById("featuredBlogPost").innerHTML = featured ? `
                <article>
                    <div class="asg-question-head">
                        <span>${escapeHtml(featured.category)}</span>
                        <small>${escapeHtml(featured.readTime)} | ${escapeHtml(featured.author)}</small>
                    </div>
                    <h2>${escapeHtml(featured.title)}</h2>
                    <p>${escapeHtml(featured.excerpt)}</p>
                    ${renderBlogAction(featured, true)}
                </article>
            ` : "";

            document.getElementById("blogGrid").innerHTML = gridPosts.map((post) => `
                <article class="asg-public-card">
                    <div class="asg-question-head">
                        <span>${escapeHtml(post.category)}</span>
                        <small>${escapeHtml(post.readTime)}</small>
                    </div>
                    <h2>${escapeHtml(post.title)}</h2>
                    <p>${escapeHtml(post.excerpt)}</p>
                    ${renderBlogAction(post)}
                </article>
            `).join("") || `
                <div class="asg-empty-state">
                    <h2>No posts found</h2>
                    <p>Try another search or ask admin to publish new posts.</p>
                </div>
            `;
        }

        window.addEventListener("asg:data-updated", (event) => {
            if (event.detail && event.detail.key === ASG_LEARNING_KEYS.blogPosts) renderBlogPosts();
        });
        window.addEventListener("storage", (event) => {
            if (event.key === ASG_LEARNING_KEYS.blogPosts) renderBlogPosts();
        });

        renderBlogPosts();
    </script>
</body>
</html>
