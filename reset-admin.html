<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f6f8fb;
            padding: 20px;
        }

        .container {
            width: min(520px, 100%);
            background: white;
            padding: 2rem;
            border: 1px solid #dde5ef;
            border-radius: 8px;
            box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08);
            text-align: center;
        }

        button {
            background: #0f766e;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: 700;
        }

        .success {
            color: #115e59;
            margin-top: 1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reset ASG Tech Admin</h1>
        <p>This restores the demo admin and student accounts for local testing.</p>
        <p><strong>admin@asgtech.com</strong> / <strong>admin123</strong></p>
        <button onclick="resetAdmin()">Reset Admin Now</button>
        <div id="message"></div>
    </div>

    <script>
        function resetAdmin() {
            const users = [
                {
                    id: 1,
                    name: "ASG Tech Admin",
                    email: "admin@asgtech.com",
                    password: "admin123",
                    role: "admin",
                    joinDate: new Date().toISOString()
                },
                {
                    id: 2,
                    name: "Demo Student",
                    email: "student@test.com",
                    password: "student123",
                    role: "student",
                    joinDate: new Date().toISOString()
                }
            ];

            localStorage.setItem("users", JSON.stringify(users));
            sessionStorage.removeItem("currentUser");
            document.getElementById("message").innerHTML = '<div class="success">Admin reset successful. Redirecting to login...</div>';

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1600);
        }
    </script>
</body>
</html>
