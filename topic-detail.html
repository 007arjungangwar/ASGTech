<!DOCTYPE html>
<html lang="en">
<head>
    <script src="supabase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <script src="exam-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="asg-lesson-focus">
    <nav></nav>

    <main class="asg-topic-page">
        <section class="asg-page-hero" id="topicHero"></section>
        <section class="asg-course-layout">
            <aside class="asg-topic-sidebar" id="topicList"></aside>
            <section class="asg-live-panel asg-topic-workspace">
                <div class="asg-topic-tabs" role="tablist">
                    <button class="asg-topic-toggle" type="button" onclick="toggleTopicRail()">Topics</button>
                    <button class="active" type="button" onclick="selectTopicTab('content', this)">Content</button>
                    <button type="button" onclick="selectTopicTab('quiz', this)">Quiz</button>
                    <button type="button" onclick="selectTopicTab('coding', this)">Coding</button>
                    <button type="button" onclick="selectTopicTab('video', this)">Video</button>
                    <button id="topicFullscreenButton" type="button" onclick="toggleLessonFullscreen()" aria-pressed="false">Fullscreen</button>
                    <span class="asg-progress-note" id="lessonProgressState">Saving progress</span>
                </div>
                <article class="asg-topic-content" id="topicPanel"></article>
            </section>
        </section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Topic lesson.</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const topicUser = getCurrentUser();
        let course = asgGetCourseById(params.get("course"));
        let topic = course ? asgGetTopicById(course.id, params.get("topic")) : null;
        let activeTopicTab = "content";
        let topicCodingChallenges = course && topic ? asgGetTopicCodingChallenges(course.id, topic.id) : [];
        let activeCodingIndex = 0;
        let topicPyodideInstance = null;
        let topicPyodideLoading = null;
        let lastTopicDataSignature = "";
        const topicMainShell = document.querySelector("main").innerHTML;

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getEmbedUrl(url) {
            const value = String(url || "").trim();
            if (!value) return "";
            if (value.includes("youtube.com/watch?v=")) return value.replace("watch?v=", "embed/");
            if (value.includes("youtu.be/")) return `https://www.youtube.com/embed/${value.split("youtu.be/")[1].split(/[?&]/)[0]}`;
            return value;
        }

        function getActiveTopics() {
            return course && Array.isArray(course.topics)
                ? course.topics.filter((item) => item.status !== "draft")
                : [];
        }

        function getCurrentTopicIndex() {
            return Math.max(0, getActiveTopics().findIndex((item) => item.id === topic.id));
        }

        function getPlainLessonText(html) {
            const reader = document.createElement("div");
            reader.innerHTML = String(html || "");
            return reader.textContent || reader.innerText || "";
        }

        function getEstimatedReadMinutes() {
            const plainText = topic.contentType === "pdf"
                ? topic.title
                : getPlainLessonText(topic.content || topic.title);
            const words = plainText.trim().split(/\s+/).filter(Boolean).length;
            return Math.max(1, Math.ceil(words / 180));
        }

        function getTopicState(progressRecord = null) {
            const progress = progressRecord || asgGetCourseProgress(topicUser, course.id);
            const state = progress && Array.isArray(progress.topicStates)
                ? progress.topicStates.find((item) => item.topicId === topic.id)
                : null;
            return state || asgGetCourseTopicCompletionState(topicUser, course, topic, asgGetStoredCourseProgress(topicUser, course.id));
        }

        function renderReaderSteps(state) {
            return `
                <div class="asg-reader-steps" aria-label="Lesson completion steps">
                    ${state.steps.map((step) => `
                        <span class="asg-reader-step ${step.done ? "done" : ""}">
                            ${escapeHtml(step.label)}
                            <strong>${step.done ? "Done" : "Pending"}</strong>
                        </span>
                    `).join("")}
                </div>
            `;
        }

        function topicHref(item) {
            return `topic-detail.html?course=${encodeURIComponent(course.id)}&topic=${encodeURIComponent(item.id)}`;
        }

        function getTopicDataSignature() {
            if (!course || !topic) return "";
            return JSON.stringify({
                courseId: course.id,
                courseTitle: course.title,
                courseSummary: course.summary,
                topicId: topic.id,
                topicTitle: topic.title,
                topicStatus: topic.status,
                contentType: topic.contentType || "",
                content: topic.content || "",
                contentUrl: topic.contentUrl || "",
                contentDataUrl: topic.contentDataUrl || "",
                quizHtml: topic.quizHtml || "",
                quizRenderMode: topic.quizRenderMode || "",
                videoUrl: topic.videoUrl || "",
                topics: getActiveTopics().map((item) => ({
                    id: item.id,
                    title: item.title,
                    status: item.status,
                    order: item.order
                })),
                coding: topicCodingChallenges.map((item) => ({
                    id: item.id,
                    title: item.title,
                    difficulty: item.difficulty,
                    prompt: item.prompt,
                    starterCode: item.starterCode,
                    tests: item.tests
                }))
            });
        }

        function renderReaderNav() {
            const topics = getActiveTopics();
            const index = getCurrentTopicIndex();
            const previous = topics[index - 1];
            const next = topics[index + 1];

            const previousHtml = previous
                ? `<a href="${topicHref(previous)}"><span>Previous lesson</span><strong>${escapeHtml(previous.title)}</strong></a>`
                : `<span class="disabled"><span>Previous lesson</span><strong>Start of course</strong></span>`;
            const nextHtml = next
                ? `<a class="next" href="${topicHref(next)}"><span>Next lesson</span><strong>${escapeHtml(next.title)}</strong></a>`
                : `<span class="disabled next"><span>Next lesson</span><strong>Course complete</strong></span>`;

            return `<nav class="asg-reader-nav" aria-label="Lesson navigation">${previousHtml}${nextHtml}</nav>`;
        }

        function renderLessonContentTab(progressRecord = null) {
            const topics = getActiveTopics();
            const index = getCurrentTopicIndex();
            const state = getTopicState(progressRecord);
            const usesMediaReader = topic.contentType === "pdf" || shouldUseHtmlFrame(topic.content, "auto");
            const statusText = state.completed
                ? "Completed"
                : `${state.completedSteps}/${state.totalSteps} steps complete`;

            return `
                <div class="asg-reader-shell ${usesMediaReader ? "has-media" : ""}">
                    <header class="asg-reader-header">
                        <div>
                            <span class="asg-reader-kicker">Lesson ${index + 1} of ${topics.length}</span>
                            <h2>${escapeHtml(topic.title)}</h2>
                            <p>${escapeHtml(course.summary || "Read the lesson, then complete the quiz and coding task when available.")}</p>
                        </div>
                        <aside class="asg-reader-meta" aria-label="Lesson overview">
                            <span><strong>${getEstimatedReadMinutes()}</strong> min read</span>
                            <span><strong>${escapeHtml(statusText)}</strong> progress</span>
                        </aside>
                    </header>
                    ${renderReaderSteps(state)}
                    <div class="asg-reader-body ${usesMediaReader ? "has-media" : ""}">
                        ${renderTopicContent()}
                    </div>
                    ${renderReaderNav()}
                </div>
            `;
        }

        function renderVideo() {
            if (!topic.videoUrl) {
                return `<div class="asg-empty-state"><h2>No video added</h2><p>The admin can add a topic video link from the dashboard.</p></div>`;
            }
            const embedUrl = getEmbedUrl(topic.videoUrl);
            return `
                <div class="asg-video-frame">
                    <iframe src="${escapeHtml(embedUrl)}" title="${escapeHtml(topic.title)} video" allowfullscreen></iframe>
                </div>
                <p><a href="${escapeHtml(topic.videoUrl)}" target="_blank" rel="noopener">Open video link</a></p>
            `;
        }

        function shouldUseHtmlFrame(html, mode) {
            const value = String(html || "");
            return mode === "iframe" || /<script[\s>]/i.test(value) || /<!doctype html|<html[\s>]/i.test(value);
        }

        function renderHtmlFrame(html, title) {
            return `
                <iframe
                    class="asg-content-frame"
                    title="${escapeHtml(title)}"
                    sandbox="allow-scripts allow-forms allow-popups allow-modals"
                    srcdoc="${escapeHtml(html)}"
                ></iframe>
            `;
        }

        function renderTopicContent() {
            const pdfSource = topic.contentType === "pdf" ? (topic.contentUrl || topic.contentDataUrl || "") : "";
            if (pdfSource) {
                return `
                    <div class="asg-file-reader">
                        <div class="asg-question-head">
                            <span>${escapeHtml(topic.contentFileName || "Lesson PDF")}</span>
                            <a href="${escapeHtml(pdfSource)}" target="_blank" rel="noopener">Open PDF</a>
                        </div>
                        <object data="${escapeHtml(pdfSource)}" type="application/pdf">
                            <iframe src="${escapeHtml(pdfSource)}" title="${escapeHtml(topic.title)} PDF"></iframe>
                        </object>
                    </div>
                `;
            }

            if (shouldUseHtmlFrame(topic.content, "auto")) {
                return renderHtmlFrame(topic.content, topic.title);
            }

            return topic.content;
        }

        function renderTopicQuiz() {
            const quizHtml = topic.quizHtml || `<div class="asg-empty-state"><h2>No quiz content</h2><p>The admin can add topic quiz HTML from the dashboard.</p></div>`;
            if (shouldUseHtmlFrame(quizHtml, topic.quizRenderMode)) {
                return renderHtmlFrame(quizHtml, `${topic.title} quiz`);
            }
            return quizHtml;
        }

        function topicCodingDraftKey(challengeId) {
            const userId = topicUser ? topicUser.id : "guest";
            return `topicCodingDraft_${userId}_${course.id}_${topic.id}_${challengeId}`;
        }

        function loadTopicPyodideScript() {
            if (window.loadPyodide) return Promise.resolve();
            return new Promise((resolve, reject) => {
                const existing = document.querySelector("script[data-pyodide-loader]");
                if (existing) {
                    existing.addEventListener("load", resolve, { once: true });
                    existing.addEventListener("error", reject, { once: true });
                    return;
                }

                const script = document.createElement("script");
                script.src = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js";
                script.dataset.pyodideLoader = "true";
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function getTopicPyodideEngine() {
            if (topicPyodideInstance) return topicPyodideInstance;
            if (!topicPyodideLoading) {
                const status = document.getElementById("topicCodingEngineStatus");
                if (status) status.textContent = "Loading Python engine...";
                topicPyodideLoading = loadTopicPyodideScript()
                    .then(() => window.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" }))
                    .then((engine) => {
                        topicPyodideInstance = engine;
                        const readyStatus = document.getElementById("topicCodingEngineStatus");
                        if (readyStatus) readyStatus.textContent = "Python engine ready.";
                        return engine;
                    });
            }
            return topicPyodideLoading;
        }

        function buildTopicCodingHarness(code, tests) {
            return `
import contextlib, io, json, traceback
USER_CODE = ${JSON.stringify(code)}
TESTS = json.loads(${JSON.stringify(JSON.stringify(tests))})
payload = {"passed": 0, "total": len(TESTS), "results": [], "stdout": "", "setupStdout": "", "error": ""}
setup_buffer = io.StringIO()
namespace = {}
try:
    with contextlib.redirect_stdout(setup_buffer):
        exec(USER_CODE, namespace)
    payload["setupStdout"] = setup_buffer.getvalue()
    solution = namespace.get("solution")
    if not callable(solution):
        raise Exception("Define a function named solution.")
    for index, test in enumerate(TESTS, start=1):
        try:
            test_buffer = io.StringIO()
            args = test.get("args", [])
            with contextlib.redirect_stdout(test_buffer):
                got = solution(*args)
            expected = test.get("expected")
            passed = got == expected
            if passed:
                payload["passed"] += 1
            payload["results"].append({"index": index, "passed": passed, "args": args, "expected": expected, "got": got, "stdout": test_buffer.getvalue()})
        except Exception as error:
            payload["results"].append({"index": index, "passed": False, "args": test.get("args", []), "expected": test.get("expected"), "got": "Error: " + str(error), "stdout": locals().get("test_buffer", io.StringIO()).getvalue()})
except Exception:
    payload["error"] = traceback.format_exc(limit=4)
    payload["setupStdout"] = setup_buffer.getvalue()
payload["stdout"] = payload["setupStdout"] + "".join([item.get("stdout", "") for item in payload["results"]])
json.dumps(payload, default=str)
`;
        }

        function renderTopicCoding() {
            topicCodingChallenges = asgGetTopicCodingChallenges(course.id, topic.id);
            if (!topicCodingChallenges.length) {
                return `<div class="asg-empty-state"><h2>No coding task added</h2><p>The admin can attach a topic coding test from the dashboard.</p></div>`;
            }

            if (!topicCodingChallenges[activeCodingIndex]) activeCodingIndex = 0;
            const challenge = topicCodingChallenges[activeCodingIndex] || topicCodingChallenges[0];
            const submissions = asgGetTopicCodingSubmissions(topicUser, course.id, topic.id);
            const solvedIds = new Set(submissions.filter((submission) => submission.total > 0 && submission.passed === submission.total).map((submission) => submission.challengeId));
            const draft = localStorage.getItem(topicCodingDraftKey(challenge.id)) || challenge.starterCode || "def solution():\n    pass\n";

            return `
                <div class="asg-topic-coding-layout">
                    <aside class="asg-topic-coding-list">
                        ${topicCodingChallenges.map((item, index) => `
                            <button class="${index === activeCodingIndex ? "active" : ""}" type="button" onclick="selectTopicCodingChallenge(${index})">
                                <span>${escapeHtml(item.title)}</span>
                                <small>${escapeHtml(item.difficulty)} | ${solvedIds.has(item.id) ? "Solved" : "Open"}</small>
                            </button>
                        `).join("")}
                    </aside>
                    <section class="asg-topic-coding-workspace">
                        <div class="asg-question-head">
                            <span>${escapeHtml(challenge.topicTitle || topic.title)}</span>
                            <small>${escapeHtml(challenge.difficulty)}</small>
                        </div>
                        <h2>${escapeHtml(challenge.title)}</h2>
                        <pre class="asg-question-text">${escapeHtml(challenge.prompt)}</pre>
                        <div class="asg-test-preview">
                            <h3>Tests</h3>
                            ${challenge.tests.map((test, index) => `
                                <div class="asg-test-row">
                                    <span>Test ${index + 1}</span>
                                    <code>solution(${escapeHtml(test.args.map((arg) => JSON.stringify(arg)).join(", "))})</code>
                                    <code>Expected: ${escapeHtml(JSON.stringify(test.expected))}</code>
                                </div>
                            `).join("")}
                        </div>
                        <div class="asg-editor-toolbar">
                            <span id="topicCodingEngineStatus">Python engine loads when you run code.</span>
                            <button class="btn-primary" type="button" onclick="runTopicCodingChallenge()">Run Coding Test</button>
                        </div>
                        <textarea id="topicCodingEditor" class="asg-python-editor" spellcheck="false" wrap="off">${escapeHtml(draft)}</textarea>
                        <div class="asg-output-panel" id="topicCodingOutput">
                            <h3>Run output</h3>
                            <p>Run your solution to see printed output, return values, and save coding progress for this topic.</p>
                        </div>
                    </section>
                </div>
            `;
        }

        function selectTopicCodingChallenge(index) {
            activeCodingIndex = index;
            document.getElementById("topicPanel").innerHTML = renderTopicCoding();
            setupTopicCodingEditor();
        }

        function setupTopicCodingEditor() {
            const editor = document.getElementById("topicCodingEditor");
            const challenge = topicCodingChallenges[activeCodingIndex];
            if (!editor || !challenge) return;
            asgEnhancePythonEditor(editor);
            editor.addEventListener("input", () => {
                localStorage.setItem(topicCodingDraftKey(challenge.id), editor.value);
            });
            editor.addEventListener("keydown", (event) => {
                if (event.key !== "Tab") return;
                event.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = `${editor.value.slice(0, start)}    ${editor.value.slice(end)}`;
                editor.selectionStart = editor.selectionEnd = start + 4;
                asgRefreshPythonEditor(editor);
            });
        }

        function renderTopicCodingResult(payload, savedSubmission) {
            const output = document.getElementById("topicCodingOutput");
            if (!output) return;
            const percentage = payload.total ? Math.round((payload.passed / payload.total) * 100) : 0;
            const stdoutBlock = payload.stdout || payload.setupStdout
                ? `<pre>${escapeHtml(payload.stdout || payload.setupStdout)}</pre>`
                : "<p>No printed output.</p>";
            output.innerHTML = `
                <div class="asg-result-summary">
                    <div><span>Tests passed</span><strong>${payload.passed}/${payload.total}</strong></div>
                    <div><span>Score</span><strong>${percentage}%</strong></div>
                    <p>${savedSubmission ? "Coding progress saved for this topic." : "Run completed."}</p>
                </div>
                ${payload.error ? asgRenderPythonError(payload.error) : ""}
                <div class="asg-run-output-grid">
                    <section class="asg-console-output">
                        <h3>Console output</h3>
                        ${stdoutBlock}
                    </section>
                    <section class="asg-return-output">
                        <h3>Function return values</h3>
                        <div class="asg-review-list">
                            ${payload.results.map((result) => `
                                <article class="asg-review-item ${result.passed ? "correct" : "wrong"}">
                                    <div class="asg-question-head"><span>Test ${result.index}</span><small>${result.passed ? "Passed" : "Failed"}</small></div>
                                    <p><strong>Input:</strong> solution(${escapeHtml((result.args || []).map((arg) => JSON.stringify(arg)).join(", "))})</p>
                                    <p><strong>Returned:</strong> ${escapeHtml(JSON.stringify(result.got))}</p>
                                    <p><strong>Expected:</strong> ${escapeHtml(JSON.stringify(result.expected))}</p>
                                    ${result.stdout ? `<h4>Printed during this test</h4><pre>${escapeHtml(result.stdout)}</pre>` : ""}
                                </article>
                            `).join("")}
                        </div>
                    </section>
                </div>
            `;
        }

        async function runTopicCodingChallenge() {
            const challenge = topicCodingChallenges[activeCodingIndex];
            const editor = document.getElementById("topicCodingEditor");
            const button = document.querySelector(".asg-topic-coding-workspace .asg-editor-toolbar .btn-primary");
            if (!challenge || !editor || !button) return;

            button.disabled = true;
            button.textContent = "Running...";
            const output = document.getElementById("topicCodingOutput");
            if (output) {
                output.innerHTML = `
                    <h3>Run output</h3>
                    <p>Running your code. Console output and return values will appear here.</p>
                `;
            }
            try {
                const engine = await getTopicPyodideEngine();
                const payload = JSON.parse(await engine.runPythonAsync(buildTopicCodingHarness(editor.value, challenge.tests)));
                const percentage = payload.total ? Math.round((payload.passed / payload.total) * 100) : 0;
                const savedSubmission = asgSaveCodingSubmission({
                    challengeId: challenge.id,
                    challengeTitle: challenge.title,
                    passed: payload.passed,
                    total: payload.total,
                    percentage,
                    code: editor.value,
                    results: payload.results,
                    stdout: payload.stdout,
                    courseId: course.id,
                    courseTitle: course.title,
                    topicId: topic.id,
                    topicTitle: topic.title,
                    submissionReason: "topic-coding-run"
                });

                if (payload.total > 0 && payload.passed === payload.total) {
                    asgSaveCourseProgress(topicUser, course, topic, "coding", {
                        codingChallengeId: challenge.id,
                        codingPassed: true
                    });
                    saveLessonProgress();
                }

                renderTopicCodingResult(payload, savedSubmission);
                const list = document.querySelector(".asg-topic-coding-list");
                if (list) {
                    const submissions = asgGetTopicCodingSubmissions(topicUser, course.id, topic.id);
                    const solvedIds = new Set(submissions.filter((submission) => submission.total > 0 && submission.passed === submission.total).map((submission) => submission.challengeId));
                    list.innerHTML = topicCodingChallenges.map((item, index) => `
                        <button class="${index === activeCodingIndex ? "active" : ""}" type="button" onclick="selectTopicCodingChallenge(${index})">
                            <span>${escapeHtml(item.title)}</span>
                            <small>${escapeHtml(item.difficulty)} | ${solvedIds.has(item.id) ? "Solved" : "Open"}</small>
                        </button>
                    `).join("");
                }
            } catch (error) {
                const status = document.getElementById("topicCodingEngineStatus");
                if (status) status.textContent = "Python engine failed to load.";
                const output = document.getElementById("topicCodingOutput");
                if (output) output.innerHTML = `<h3>Run output</h3>${asgRenderPythonError(error.message || error)}`;
            } finally {
                button.disabled = false;
                button.textContent = "Run Coding Test";
            }
        }

        function toggleTopicRail() {
            document.body.classList.toggle("asg-topic-rail-collapsed");
            const button = document.querySelector(".asg-topic-toggle");
            if (button) {
                const isCollapsed = document.body.classList.contains("asg-topic-rail-collapsed");
                button.textContent = isCollapsed ? "Show Topics" : "Topics";
                button.setAttribute("aria-expanded", String(!isCollapsed));
            }
        }

        function getTopicPanel() {
            return document.getElementById("topicPanel");
        }

        function ensureLessonFullscreenExitButton() {
            const panel = getTopicPanel();
            if (!panel || panel.querySelector(".asg-reader-fullscreen-exit")) return;

            const button = document.createElement("button");
            button.className = "asg-reader-fullscreen-exit";
            button.type = "button";
            button.textContent = "Exit Fullscreen";
            button.setAttribute("aria-label", "Exit lesson fullscreen");
            button.addEventListener("click", toggleLessonFullscreen);
            panel.insertBefore(button, panel.firstChild);
        }

        function removeLessonFullscreenExitButton() {
            const button = document.querySelector(".asg-reader-fullscreen-exit");
            if (button) button.remove();
        }

        function setLessonFullscreenState(active) {
            const panel = getTopicPanel();
            document.body.classList.toggle("asg-topic-content-fullscreen", active);
            if (panel) {
                panel.classList.toggle("asg-topic-panel-fullscreen", active);
                if (active) panel.setAttribute("tabindex", "-1");
                else panel.removeAttribute("tabindex");
            }

            const button = document.getElementById("topicFullscreenButton");
            if (button) {
                button.textContent = active ? "Exit Fullscreen" : "Fullscreen";
                button.setAttribute("aria-pressed", String(active));
            }

            if (active) ensureLessonFullscreenExitButton();
            else removeLessonFullscreenExitButton();
        }

        async function toggleLessonFullscreen() {
            const panel = getTopicPanel();
            if (!panel) return;

            const isActive = document.body.classList.contains("asg-topic-content-fullscreen");
            sessionStorage.removeItem("asgCourseFullscreen");

            if (isActive) {
                setLessonFullscreenState(false);
                if (document.fullscreenElement) {
                    await ASGExamGuard.exitFullscreen();
                }
                return;
            }

            setLessonFullscreenState(true);
            panel.scrollTop = 0;
            panel.focus({ preventScroll: true });
            await ASGExamGuard.requestFullscreen(panel);
        }

        function selectTopicTab(tab, button) {
            activeTopicTab = tab;
            document.querySelectorAll(".asg-topic-tabs button").forEach((item) => item.classList.remove("active"));
            button.classList.add("active");

            const panel = document.getElementById("topicPanel");
            if (tab === "quiz") {
                panel.innerHTML = renderTopicQuiz();
                if (document.body.classList.contains("asg-topic-content-fullscreen")) ensureLessonFullscreenExitButton();
                saveLessonProgress();
                return;
            }
            if (tab === "coding") {
                panel.innerHTML = renderTopicCoding();
                setupTopicCodingEditor();
                if (document.body.classList.contains("asg-topic-content-fullscreen")) ensureLessonFullscreenExitButton();
                saveLessonProgress();
                return;
            }
            if (tab === "video") {
                panel.innerHTML = renderVideo();
                if (document.body.classList.contains("asg-topic-content-fullscreen")) ensureLessonFullscreenExitButton();
                saveLessonProgress();
                return;
            }
            const progress = saveLessonProgress();
            panel.innerHTML = renderLessonContentTab(progress);
            if (document.body.classList.contains("asg-topic-content-fullscreen")) ensureLessonFullscreenExitButton();
        }

        function updateLessonProgressState(progress) {
            const status = document.getElementById("lessonProgressState");
            if (status && progress) {
                status.textContent = `Saved: ${progress.topicIndex}/${progress.totalTopics}`;
            }
        }

        function saveLessonProgress() {
            const progress = asgSaveCourseProgress(topicUser, course, topic, activeTopicTab);
            updateLessonProgressState(progress);
            return progress;
        }

        function renderTopic() {
            if (!course || !topic) {
                document.querySelector("main").innerHTML = `
                    <section class="asg-empty-state">
                        <h2>Topic not found</h2>
                        <p>Return to courses and choose an active topic.</p>
                        <a class="btn-primary" href="courses.html">Back to Courses</a>
                    </section>
                `;
                return;
            }

            if (!document.getElementById("topicHero")) {
                document.querySelector("main").innerHTML = topicMainShell;
            }

            document.title = `${topic.title} | ASG Tech`;
            const progress = asgSaveCourseProgress(topicUser, course, topic, activeTopicTab) || asgGetCourseProgress(topicUser, course.id);
            const activeTopics = getActiveTopics();
            const currentTopicIndex = getCurrentTopicIndex();
            const stateByTopicId = new Map((progress.topicStates || []).map((state) => [state.topicId, state]));
            document.getElementById("topicHero").innerHTML = `
                <div>
                    <div class="asg-eyebrow">${escapeHtml(course.title)}</div>
                    <h1>${escapeHtml(topic.title)}</h1>
                    <p>Lesson content uses a focused course reader. Use Topics to show or hide the course outline.</p>
                </div>
                <div class="asg-hero-metrics">
                    <div><strong>${activeTopics.length}</strong><span>Topics</span></div>
                    <div><strong>${escapeHtml(topic.status)}</strong><span>Status</span></div>
                    <div><strong>Lesson</strong><span>Mode</span></div>
                </div>
            `;
            document.getElementById("topicList").innerHTML = `
                <div class="asg-topic-sidebar-head">
                    <span>Course outline</span>
                    <strong>${escapeHtml(course.title)}</strong>
                    <small>${currentTopicIndex + 1} of ${activeTopics.length} lessons</small>
                </div>
                <div class="asg-topic-list-scroll">
                    ${activeTopics.map((item, index) => {
                        const state = stateByTopicId.get(item.id);
                        const progressText = state
                            ? (state.completed ? "Done" : `${state.completedSteps}/${state.totalSteps}`)
                            : "Open";
                        return `
                            <a class="asg-topic-link ${item.id === topic.id ? "active" : ""}" href="${topicHref(item)}">
                                <span><small>Lesson ${index + 1}</small>${escapeHtml(item.title)}</span>
                                <em>${escapeHtml(progressText)}</em>
                            </a>
                        `;
                    }).join("")}
                </div>
                <a class="asg-topic-back-link" href="courses.html">Back to courses</a>
            `;
            document.getElementById("topicPanel").innerHTML = renderLessonContentTab(progress);
            lastTopicDataSignature = getTopicDataSignature();
            updateLessonProgressState(progress);
        }

        function reloadTopicFromStore() {
            course = asgGetCourseById(params.get("course"));
            topic = course ? asgGetTopicById(course.id, params.get("topic")) : null;
            topicCodingChallenges = course && topic ? asgGetTopicCodingChallenges(course.id, topic.id) : [];
            if (activeCodingIndex >= topicCodingChallenges.length) activeCodingIndex = 0;
        }

        function refreshTopicFromStore() {
            reloadTopicFromStore();
            const nextSignature = getTopicDataSignature();
            if (nextSignature && nextSignature === lastTopicDataSignature) {
                updateLessonProgressState(asgGetCourseProgress(topicUser, course.id));
                return;
            }
            renderTopic();
        }

        function handleTopicDataUpdate(event) {
            const key = event.detail ? event.detail.key : event.key;
            const watchedKeys = [
                ASG_LEARNING_KEYS.courses,
                ASG_LEARNING_KEYS.codingChallenges,
                ASG_LEARNING_KEYS.codingSubmissions
            ];
            if (!watchedKeys.includes(key)) return;
            if (key === ASG_LEARNING_KEYS.codingSubmissions && activeTopicTab !== "coding") return;
            refreshTopicFromStore();
        }

        window.addEventListener("asg:data-updated", handleTopicDataUpdate);
        window.addEventListener("storage", handleTopicDataUpdate);

        renderTopic();
        sessionStorage.removeItem("asgCourseFullscreen");

        document.addEventListener("fullscreenchange", () => {
            const panel = getTopicPanel();
            if (document.fullscreenElement === panel) return;
            if (document.body.classList.contains("asg-topic-content-fullscreen")) {
                setLessonFullscreenState(false);
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && document.body.classList.contains("asg-topic-content-fullscreen") && !document.fullscreenElement) {
                setLessonFullscreenState(false);
            }
        });
    </script>
</body>
</html>
