<!DOCTYPE html>
<html lang="en">
<head>
    <script src="supabase-backend.js"></script>
    <script src="auth-check.js"></script>
    <script src="published-learning-data.js"></script>
    <script src="learning-data.js"></script>
    <script src="exam-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course | ASG Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="asg-course-focus">
    <nav></nav>

    <main class="asg-course-reader">
        <section class="asg-page-hero" id="courseHero"></section>
        <section class="asg-course-layout">
            <aside class="asg-topic-sidebar" id="topicList"></aside>
            <section class="asg-live-panel">
                <div class="asg-section-header">
                    <div>
                        <h2>Cheat Sheet</h2>
                        <p>Quick reference before you open the lessons.</p>
                    </div>
                    <button class="btn-secondary" type="button" onclick="requestCourseFullscreen()">Fullscreen</button>
                </div>
                <div class="asg-cheat-sheet" id="courseCheatSheet"></div>
            </section>
        </section>
    </main>

    <footer>
        <p class="copyright">ASG Tech Institute. Course workspace.</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const courseUser = getCurrentUser();
        let course = asgGetCourseById(params.get("course"));
        const courseMainShell = document.querySelector("main").innerHTML;
        let courseAccessRefreshStarted = false;

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function requestCourseFullscreen() {
            sessionStorage.setItem("asgCourseFullscreen", "1");
            ASGExamGuard.requestFullscreen();
        }

        function redirectToCourseLogin() {
            if (!course) return;
            sessionStorage.setItem("asgAuthNotice", "Sign in first, then request paid course access.");
            window.location.href = `login.html?next=${encodeURIComponent(`course-detail.html?course=${course.id}`)}`;
        }

        async function requestCourseAccess() {
            if (!course) return;
            if (!courseUser) {
                redirectToCourseLogin();
                return;
            }
            if (!course.paymentQrUrl) {
                alert("Payment QR is not available for this course yet.");
                return;
            }
            const request = asgSaveCourseAccessRequest(courseUser, course, "Student marked payment as completed.");
            renderCourse();
            await asgSyncCourseAccessRequestToCloud(request);
            renderCourse();
        }

        function renderCourseAccessRequired() {
            const request = courseUser ? asgGetLatestCourseAccessRequest(courseUser, course.id) : null;
            const canRequest = Boolean(courseUser && course.paymentQrUrl);
            const requestText = request && request.requestedAt
                ? `Request sent ${new Date(request.requestedAt).toLocaleDateString()}`
                : "Scan the QR, complete payment, then send your request.";
            const action = !courseUser
                ? `<button class="btn-primary" type="button" onclick="redirectToCourseLogin()">Sign In to Request Access</button>`
                : `<button class="btn-primary" type="button" ${canRequest ? "" : "disabled"} onclick="requestCourseAccess()">${request ? "Request Again" : "I Have Paid - Request Access"}</button>`;

            document.querySelector("main").innerHTML = `
                <section class="asg-course-access-panel">
                    <article class="asg-course-access-card">
                        <div class="asg-course-access-copy">
                            <span class="asg-course-label">${escapeHtml(course.price)}</span>
                            <h1>${escapeHtml(course.title)}</h1>
                            <p>This is a paid course. Access opens after payment and admin approval.</p>
                            <strong class="asg-course-payment-status">${escapeHtml(requestText)}</strong>
                            <div class="asg-form-actions">
                                ${action}
                                <a class="btn-secondary" href="courses.html">Back to Courses</a>
                            </div>
                        </div>
                        <div class="asg-course-payment-box">
                            ${course.paymentQrUrl ? `
                        <img class="asg-course-payment-qr" src="${escapeHtml(course.paymentQrUrl)}" alt="${escapeHtml(course.title)} payment QR" loading="lazy" decoding="async">
                            ` : `
                                <div class="asg-empty-state compact">
                                    <h2>QR not uploaded</h2>
                                    <p>Admin needs to add the payment QR before students can request access.</p>
                                </div>
                            `}
                        </div>
                    </article>
                </section>
            `;
        }

        async function continueCourse() {
            if (!course) return;
            if (!asgHasCourseAccess(courseUser, course)) {
                renderCourseAccessRequired();
                return;
            }
            const progress = asgGetCourseProgress(courseUser, course.id);
            const savedTopic = progress
                ? course.topics.find((topic) => topic.id === progress.topicId)
                : null;
            const targetTopic = savedTopic || course.topics[0];
            if (!targetTopic) return;
            sessionStorage.setItem("asgCourseFullscreen", "1");
            await ASGExamGuard.requestFullscreen();
            window.location.href = `topic-detail.html?course=${encodeURIComponent(course.id)}&topic=${encodeURIComponent(targetTopic.id)}`;
        }

        function renderCourse() {
            if (!course) {
                document.querySelector("main").innerHTML = `
                    <section class="asg-empty-state">
                        <h2>Course not found</h2>
                        <p>Return to courses and choose an active course.</p>
                        <a class="btn-primary" href="courses.html">Back to Courses</a>
                    </section>
                `;
                return;
            }

            if (!asgHasCourseAccess(courseUser, course)) {
                renderCourseAccessRequired();
                return;
            }

            if (!document.getElementById("courseHero")) {
                document.querySelector("main").innerHTML = courseMainShell;
            }

            const progress = asgGetCourseProgress(courseUser, course.id);
            const progressTopic = progress && progress.topicTitle ? progress.topicTitle : "";
            document.title = `${course.title} | ASG Tech`;
            document.getElementById("courseHero").innerHTML = `
                <div>
                    <div class="asg-eyebrow">Course workspace</div>
                    <h1>${escapeHtml(course.title)}</h1>
                    <p>${escapeHtml(course.welcome)}</p>
                    <div class="asg-form-actions">
                        <button class="btn-primary" type="button" onclick="continueCourse()">${progressTopic ? "Continue Learning" : "Start First Lesson"}</button>
                    </div>
                </div>
                <div class="asg-hero-metrics">
                    <div><strong>${course.topics.length}</strong><span>Topics</span></div>
                    <div><strong>${escapeHtml(course.price)}</strong><span>Access</span></div>
                    <div><strong>${progress ? `${progress.progressPercent}%` : "New"}</strong><span>${progressTopic ? "Saved" : "Course"}</span></div>
                </div>
            `;

            document.getElementById("courseCheatSheet").textContent = course.cheatSheet;
            document.getElementById("topicList").innerHTML = `
                <div class="asg-challenge-list-head">
                    <h2>Topics</h2>
                    <span>${course.topics.length} active</span>
                </div>
                ${course.topics.map((topic) => `
                    <a class="asg-topic-link ${progress && progress.topicId === topic.id ? "active" : ""}" href="topic-detail.html?course=${encodeURIComponent(course.id)}&topic=${encodeURIComponent(topic.id)}">
                        <span>${escapeHtml(topic.title)}</span>
                        ${progress && progress.topicId === topic.id ? "<small>Last opened</small>" : ""}
                    </a>
                `).join("")}
            `;
        }

        function refreshCourseFromStore() {
            course = asgGetCourseById(params.get("course"));
            renderCourse();
        }

        async function refreshCourseAccessStatusFromCloud() {
            if (!courseUser || !course || courseAccessRefreshStarted) return;
            courseAccessRefreshStarted = true;
            await asgRefreshCourseAccessRequestsForUser(courseUser, course.id);
            renderCourse();
        }

        function handleCourseDataUpdate(event) {
            const key = event.detail ? event.detail.key : event.key;
            if ([
                ASG_LEARNING_KEYS.courses,
                ASG_LEARNING_KEYS.courseProgress,
                ASG_LEARNING_KEYS.courseAccessRequests,
                ASG_LEARNING_KEYS.courseAccessPermissions
            ].includes(key)) {
                refreshCourseFromStore();
            }
        }

        window.addEventListener("asg:data-updated", handleCourseDataUpdate);
        window.addEventListener("storage", handleCourseDataUpdate);

        renderCourse();
        refreshCourseAccessStatusFromCloud();
        if (sessionStorage.getItem("asgCourseFullscreen") === "1") {
            ASGExamGuard.requestFullscreen();
            window.addEventListener("pointerdown", requestCourseFullscreen, { once: true });
        }
    </script>
</body>
</html>
